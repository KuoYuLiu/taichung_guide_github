<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Heritage Guide</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #007AFF; --bg-color: #F2F2F7; --card-bg: #FFFFFF; --text-main: #1C1C1E; --text-muted: #8E8E93; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }

        .header { position: fixed; top: 0; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
        .header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        
        .lang-select { padding: 4px; border-radius: 5px; border: 1px solid #ccc; font-size: 13px; }
        
        .test-toggle { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(14px); }

        #camera-wrapper { position: relative; width: 100%; height: 60vh; margin-top: 55px; background-color: #000; overflow: hidden; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        .viewfinder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 75%; height: 60%; border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 15px; box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.4); pointer-events: none; z-index: 10; }
        
        .controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 20; }
        .shutter-btn { width: 70px; height: 70px; border-radius: 50%; background-color: rgba(255,255,255,0.3); border: 3px solid white; display: flex; justify-content: center; align-items: center; cursor: pointer; display: none; }
        .shutter-inner { width: 54px; height: 54px; border-radius: 50%; background-color: white; }
        .start-btn { padding: 12px 24px; border-radius: 25px; background: var(--primary-color); color: white; border: none; font-size: 16px; font-weight: 600; cursor: pointer;}

        #status-bar { text-align: center; padding: 15px; font-size: 15px; color: var(--text-muted); min-height: 50px; font-weight: 500; }

        .loader { display: inline-block; width: 18px; height: 18px; border: 3px solid rgba(0,122,255,0.3); border-radius: 50%; border-top-color: var(--primary-color); animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #result-panel { padding: 0 20px 30px; display: none; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 10px rgba(0,0,0,0.03);}
        .card h3 { font-size: 18px; margin-bottom: 8px; color: var(--text-main); }
        .card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
        .landmark-badge { display: inline-block; padding: 4px 10px; background: #E5F1FF; color: var(--primary-color); border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 10px;}

        .shop-item { padding: 12px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .shop-item:last-child { border-bottom: none; }
        .shop-info h4 { font-size: 16px; margin-bottom: 4px; }
        .shop-info p { font-size: 13px; margin: 2px 0; }
        .nav-btn { background: #34C759; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; }

        .retry-btn { width: 100%; padding: 15px; background: #E5E5EA; color: var(--text-main); border: none; border-radius: 15px; font-size: 16px; font-weight: bold; margin-top: 10px; margin-bottom: 30px; cursor: pointer; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

    <div class="header">
        <h1 id="ui-title"><i class="fa-solid fa-map-location-dot" style="color:var(--primary-color);"></i> 舊城 AI 導覽</h1>
        <div class="header-controls">
            <select class="lang-select" onchange="switchLanguage(this.value)">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
            </select>
            <div class="test-toggle">
                <span id="ui-test-mode">模擬定位</span>
                <label class="switch"><input type="checkbox" id="testModeCheckbox" checked><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <div id="camera-wrapper">
        <div id="viewfinder" class="viewfinder" style="display:none;"></div>
        <div id="webcam-container"></div>
        <div class="controls">
            <button class="start-btn" id="start-btn" onclick="init()"><i class="fa-solid fa-camera"></i> <span id="ui-start-btn">啟動相機</span></button>
            <div class="shutter-btn" id="snap-btn" onclick="takeSnapshotAndPredict()"><div class="shutter-inner"></div></div>
        </div>
    </div>

    <div id="status-bar">準備就緒，請啟動相機</div>

    <div id="result-panel">
        <div id="landmark-info"></div>
        <div id="souvenir-info"></div>
        <button class="retry-btn" onclick="restartCamera()"><i class="fa-solid fa-rotate-right"></i> <span id="ui-retry-btn">掃描下一個景點</span></button>
    </div>

    <script>
        const MODEL_URL = "./model/"; 
        let model, webcam, maxPredictions;
        let isCameraRunning = false;
        let currentLang = 'zh'; // 預設語言

        // ⚠️ 請確保這裡的英文與 Teachable Machine 訓練時的名稱完全一致
        const classToIdMap = {
            "miyahara": "landmark_001",
            "old_station": "landmark_002",
            "prefectural_...": "landmark_003",
            "fourth_credi...": "landmark_004"
        };

        // 多國語言字典 (UI 介面)
        const i18n = {
            zh: { title: "舊城 AI 導覽", testMode: "模擬定位", startBtn: "啟動相機", retryBtn: "掃描下一個景點", statusReady: "準備就緒，請啟動相機", statusLoading: "載入 AI 視覺引擎中...", statusAim: "請將景點置於觀景窗內，按下快門", statusAnalyzing: "分析建築特徵中...", statusSuccess: "辨識成功！", statusFail: "辨識失敗，請確認光線並靠近一點。", loadingHistory: "讀取歷史檔案中...", loadingSouvenirs: "掃描周邊伴手禮中...", recommendTitle: "附近必買推薦", distanceLabel: "距離約", km: "公里" },
            en: { title: "AI Heritage Guide", testMode: "Mock GPS", startBtn: "Start Camera", retryBtn: "Scan Next Landmark", statusReady: "Ready, start camera", statusLoading: "Loading AI Engine...", statusAim: "Aim at the landmark and press shutter", statusAnalyzing: "Analyzing features...", statusSuccess: "Match Found!", statusFail: "Recognition failed. Move closer.", loadingHistory: "Loading historical data...", loadingSouvenirs: "Scanning nearby souvenirs...", recommendTitle: "Nearby Recommendations", distanceLabel: "Distance:", km: "km" },
            ja: { title: "旧市街 AI ガイド", testMode: "GPS テスト", startBtn: "カメラを起動", retryBtn: "次の名所をスキャン", statusReady: "準備完了、カメラを起動", statusLoading: "AI エンジンを読込中...", statusAim: "建物を枠内に収め、撮影してください", statusAnalyzing: "特徴を分析中...", statusSuccess: "認識成功！", statusFail: "認識失敗。近づいて再試行してください。", loadingHistory: "歴史データを読込中...", loadingSouvenirs: "周辺のお土産を検索中...", recommendTitle: "おすすめのお土産", distanceLabel: "距離 約", km: "km" },
            ko: { title: "구도심 AI 가이드", testMode: "GPS 시뮬레이션", startBtn: "카메라 시작", retryBtn: "다음 명소 스캔", statusReady: "준비 완료, 카메라 시작", statusLoading: "AI 엔진 로딩 중...", statusAim: "건물을 프레임에 맞추고 촬영하세요", statusAnalyzing: "특징 분석 중...", statusSuccess: "인식 성공!", statusFail: "인식 실패. 더 가까이 가보세요.", loadingHistory: "역사 데이터 로딩 중...", loadingSouvenirs: "주변 기념품 검색 중...", recommendTitle: "추천 기념품", distanceLabel: "거리 약", km: "km" }
        };

        function t(key) { return i18n[currentLang][key]; }

        function switchLanguage(lang) {
            currentLang = lang;
            document.getElementById('ui-title').innerHTML = `<i class="fa-solid fa-map-location-dot" style="color:var(--primary-color);"></i> ${t('title')}`;
            document.getElementById('ui-test-mode').innerText = t('testMode');
            document.getElementById('ui-start-btn').innerText = t('startBtn');
            document.getElementById('ui-retry-btn').innerText = t('retryBtn');
            
            if(!isCameraRunning && document.getElementById('start-btn').style.display !== "none") {
                document.getElementById('status-bar').innerText = t('statusReady');
            } else if (isCameraRunning) {
                document.getElementById('status-bar').innerText = t('statusAim');
            }
            // 若結果面板開著，隱藏它要求使用者重新掃描以載入新語言
            if(document.getElementById("result-panel").style.display === "block") restartCamera();
        }

        async function init() {
            document.getElementById("status-bar").innerHTML = `<div class="loader"></div> ${t('statusLoading')}`;
            document.getElementById("start-btn").style.display = "none";

            try {
                if (!model) {
                    model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
                    maxPredictions = model.getTotalClasses();
                }
                webcam = new tmImage.Webcam(400, 400, false); 
                await webcam.setup({ facingMode: "environment" }); 
                await webcam.play();
                
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                isCameraRunning = true;
                window.requestAnimationFrame(updateWebcam);

                document.getElementById("viewfinder").style.display = "block";
                document.getElementById("status-bar").innerText = t('statusAim');
                document.getElementById("snap-btn").style.display = "flex";
            } catch (err) {
                console.error(err);
                document.getElementById("status-bar").innerHTML = `<i class="fa-solid fa-circle-exclamation" style="color:red;"></i> Model loading error.`;
            }
        }

        function updateWebcam() {
            if (isCameraRunning) { webcam.update(); window.requestAnimationFrame(updateWebcam); }
        }

        async function takeSnapshotAndPredict() {
            isCameraRunning = false; webcam.pause(); 
            document.getElementById("snap-btn").style.display = "none";
            document.getElementById("viewfinder").style.display = "none";
            document.getElementById("status-bar").innerHTML = `<div class="loader"></div> ${t('statusAnalyzing')}`;
            document.getElementById("result-panel").style.display = "none";

            try {
                const prediction = await model.predict(webcam.canvas);
                let bestMatch = prediction.reduce((max, p) => p.probability > max.probability ? p : max, prediction[0]);

                if (bestMatch.probability > 0.80 && bestMatch.className !== "nothing") {
                    document.getElementById("status-bar").innerHTML = `<i class="fa-solid fa-circle-check" style="color:#34C759;"></i> ${t('statusSuccess')}`;
                    let landmarkId = classToIdMap[bestMatch.className];
                    document.getElementById("result-panel").style.display = "block";
                    
                    if (landmarkId) fetchLandmarkInfo(landmarkId);
                    else document.getElementById('landmark-info').innerHTML = `<p style="color:red;">ID Mapping Error</p>`;
                } else {
                    document.getElementById("status-bar").innerHTML = `<i class="fa-solid fa-circle-exclamation" style="color:#FF3B30;"></i> ${t('statusFail')}`;
                    document.getElementById("result-panel").style.display = "block";
                    document.getElementById("landmark-info").innerHTML = "";
                    document.getElementById("souvenir-info").innerHTML = "";
                }
            } catch (error) {
                console.error(error);
                document.getElementById("status-bar").innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color:#FF3B30;"></i> Error.`;
            }
        }

        function restartCamera() {
            document.getElementById("result-panel").style.display = "none";
            webcam.play(); isCameraRunning = true; window.requestAnimationFrame(updateWebcam);
            document.getElementById("viewfinder").style.display = "block";
            document.getElementById("status-bar").innerText = t('statusAim');
            document.getElementById("snap-btn").style.display = "flex";
        }

        function fetchLandmarkInfo(landmarkId) {
            document.getElementById('landmark-info').innerHTML = `<div style="text-align:center; padding: 20px;"><div class="loader"></div> ${t('loadingHistory')}</div>`;
            
            fetch('./data/landmarks.json')
            .then(res => res.json())
            .then(dataList => {
                const data = dataList.find(item => item.id === landmarkId);
                if (data) {
                    // 👉 動態依據 currentLang 讀取 JSON 欄位
                    let type = data['type_' + currentLang];
                    let name = data['name_' + currentLang];
                    let history = data['history_' + currentLang];

                    document.getElementById('landmark-info').innerHTML = `
                        <div class="card">
                            <span class="landmark-badge">${type}</span>
                            <h3><i class="fa-solid fa-building-columns"></i> ${name}</h3>
                            <p>${history}</p>
                        </div>`;
                    getUserLocation(data);
                }
            })
            .catch(err => console.error(err));
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function getUserLocation(landmarkData) {
            const isTestMode = document.getElementById('testModeCheckbox').checked;
            document.getElementById('souvenir-info').innerHTML = `<div style="text-align:center; padding: 20px;"><div class="loader"></div> ${t('loadingSouvenirs')}</div>`;

            if (isTestMode && landmarkData) {
                setTimeout(() => sendPositionToBackend({ coords: { latitude: landmarkData.latitude, longitude: landmarkData.longitude } }), 800);
            } else if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendPositionToBackend, (err) => {
                    document.getElementById('souvenir-info').innerHTML = `<p style="color:#FF3B30; text-align:center;">GPS Error.</p>`;
                });
            }
        }

        function sendPositionToBackend(position) {
            const userLat = position.coords.latitude;
            const userLon = position.coords.longitude;

            fetch('./data/souvenirs.json')
            .then(res => res.json())
            .then(shops => {
                let results = [];
                shops.forEach(shop => {
                    const dist = calculateDistance(userLat, userLon, shop.latitude, shop.longitude);
                    if (dist <= 1.5) results.push({ ...shop, distance_km: dist.toFixed(2) });
                });

                results.sort((a, b) => parseFloat(a.distance_km) - parseFloat(b.distance_km));

                if(results.length === 0) {
                    document.getElementById('souvenir-info').innerHTML = ``;
                    return;
                }

                let html = `<div class="card"><h3><i class="fa-solid fa-gift" style="color: #FF9500;"></i> ${t('recommendTitle')}</h3>`;
                results.forEach(shop => {
                    // 👉 動態依據 currentLang 讀取 JSON 欄位
                    let name = shop['name_' + currentLang];
                    let product = shop['product_' + currentLang];
                    const mapUrl = `https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${shop.latitude},${shop.longitude}`;
                    
                    html += `
                        <div class="shop-item">
                            <div class="shop-info">
                                <h4>${name}</h4>
                                <p style="color: var(--primary-color); font-weight:bold;">${product}</p>
                                <p><i class="fa-solid fa-person-walking"></i> ${t('distanceLabel')} ${shop.distance_km} ${t('km')}</p>
                            </div>
                            <a href="${mapUrl}" target="_blank" class="nav-btn"><i class="fa-solid fa-location-arrow"></i></a>
                        </div>`;
                });
                html += `</div>`;
                document.getElementById('souvenir-info').innerHTML = html;
            })
            .catch(err => console.error(err));
        }
        
        // 初始載入時設定一次預設文字
        document.getElementById('status-bar').innerText = t('statusReady');
    </script>
</body>
</html>
